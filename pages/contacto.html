    <main class="main-contacto">
        <h2>Conocé nuestras sucusales</h2>
        <section>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d846.1034710304908!2d-64.55880468194479!3d-31.976793934285574!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95d2b0447c2bd5ff%3A0x3245f2bd7c030f4c!2sPlaza%20Jose%20Hernandez!5e0!3m2!1ses!2sar!4v1779407885916!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d13538.263735126608!2d-64.54630713965395!3d-31.97267056802028!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95d2b02fbbf06027%3A0x3f7ae1fed6dd49c4!2sPozo%20Verde%20(Sendero)!5e0!3m2!1ses!2sar!4v1780604034191!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>

        <form action="" class="form">
            <label for="name">Nombre: </label>
            <input type="text" id="name">

            <label for="cel">Celular: </label>
            <input type="number" name="celular" id="cel">

            <label for="email">e-Mail: </label>
            <input type="email" name="email" id="email">

            <label for="pass">Contraseña: </label>
            <input type="password" name="pass" id="pass">
            
            <label for="comments">Comentarios: </label>
            <textarea name="comments" id="comments"></textarea>

            <div>
                <input type="submit" value="Enviar" class="form-btn">
                <input type="reset" value="Reiniciar" class="form-btn">
            </div>
        </form>

    </main>
